<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}InvoiceIQ{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:       #0a0e1a;
      --surface:  #111827;
      --card:     #1a2236;
      --border:   #1e2d44;
      --accent:   #3b82f6;
      --accent2:  #06b6d4;
      --success:  #10b981;
      --warning:  #f59e0b;
      --danger:   #ef4444;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --mono:     'JetBrains Mono', monospace;
      --sans:     'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-brand .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
    }

    .nav-links {
      display: flex;
      gap: 0.25rem;
      list-style: none;
      margin-left: auto;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.5rem 0.875rem;
      border-radius: 6px;
      transition: all 0.15s;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--text);
      background: var(--border);
    }

    /* ── MAIN ── */
    main { flex: 1; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      font-family: var(--sans);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }

    .btn-outline {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .btn-outline:hover { background: rgba(59,130,246,0.1); }

    /* ── BADGES ── */
    .badge {
      display: inline-block;
      padding: 0.2em 0.65em;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .badge-low     { background: rgba(16,185,129,0.15); color: var(--success); }
    .badge-medium  { background: rgba(245,158,11,0.15);  color: var(--warning); }
    .badge-high    { background: rgba(239,68,68,0.15);   color: var(--danger);  }
    .badge-info    { background: rgba(59,130,246,0.15);  color: var(--accent);  }

    /* ── GRID ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; }

    @media (max-width: 768px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      .container { padding: 1rem; }
    }

    /* ── FORMS ── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    input, select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.875rem;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.875rem;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }

    select option { background: var(--surface); }

    /* ── STAT NUMBER ── */
    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      font-family: var(--mono);
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    /* ── TABLE ── */
    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }

    th {
      text-align: left;
      padding: 0.75rem 1rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid rgba(30,45,68,0.5);
      color: var(--text);
    }

    tr:hover td { background: rgba(255,255,255,0.02); }

    td.mono { font-family: var(--mono); font-size: 0.8rem; color: var(--muted); }

    /* ── LOADER ── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 1rem 2rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
    }

    footer a { color: var(--accent); text-decoration: none; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.5rem;
      font-size: 0.875rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 999;
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.25s;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav>
    <a class="nav-brand" href="/">
      <span class="dot"></span>InvoiceIQ
    </a>
    <ul class="nav-links">
      <li><a href="/" id="nav-home">Home</a></li>
      <li><a href="/dashboard" id="nav-dash">Analytics</a></li>
      <li><a href="/predict" id="nav-pred">Predict</a></li>
    </ul>
  </nav>

  <main>{% block content %}{% endblock %}</main>

  <footer>
    Built for <strong>HighRadius</strong> internship · XGBoost · Random Forest · Flask ·
    <a href="https://github.com" target="_blank">GitHub ↗</a>
  </footer>

  <div class="toast" id="toast"></div>

  <script>
    // Active nav link
    const path = location.pathname;
    if (path === '/')          document.getElementById('nav-home').classList.add('active');
    else if (path.includes('dashboard')) document.getElementById('nav-dash').classList.add('active');
    else if (path.includes('predict'))   document.getElementById('nav-pred').classList.add('active');

    function showToast(msg, ok=true) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.borderColor = ok ? 'var(--success)' : 'var(--danger)';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>

  {% block extra_js %}{% endblock %}
</body>
</html>
